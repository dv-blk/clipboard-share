name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Wayland dependencies
        run: sudo apt-get install -y libwayland-dev
      - name: Build
        run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: clipboard-share-linux
          path: target/release/clipboard-share

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install MinGW
        run: sudo apt-get install -y gcc-mingw-w64-x86-64
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: clipboard-share-windows
          path: target/x86_64-pc-windows-gnu/release/clipboard-share.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: clipboard-share-linux
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: clipboard-share-windows
          path: artifacts/windows
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/linux/clipboard-share
            artifacts/windows/clipboard-share.exe
            android/app/release/app-release.apk
